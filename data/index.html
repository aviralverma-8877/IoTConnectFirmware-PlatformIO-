<!DOCTYPE html>
    <head>
        <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1">
        <link rel="icon" href="favicon.ico" type="image/gif">
        <title>
            IoT Connect : Solutions for smart homes.
        </title>
        <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
        <link href="css" rel="stylesheet">
        <script type="application/javascript" src="js"></script>
    </head>
    <body onload="print_table()">
        <h1 style="font-family: 'Fjalla One'">IoT Connect : Solutions for smart homes.</h1>
        <hr />
        <center>
            <div id='WiFi_Status' align="left" style="font-family: 'Fjalla One'">
            </div>
            <div align="right">
                <button class='style_btn' onclick="if(confirm('Are you sure you want to reset this device?')){httpGet(0,0,'device','{\'action\':\'reset\'}')}">Reset</button>
                <button class='style_btn' onclick="httpGet(0,0,'device','{\'action\':\'reboot\'}')">Reboot</button>
                <button class='style_btn' onclick="location.href = ('/update')">Update</button>
                <br />
            </div>
            <div>
                <input type="checkbox" id="on_board_led" onchange="httpGet(0,0,'device','{\'action\':\'toggle_onb\',\'status\':'+this.checked+'}')" /> <span style="font-family: 'Fjalla One'">Enable/Disable On Board LED</span>
            </div>
            <hr />
            <table id="relay_table" cellspacing="15" style="border:#ccc solid thin">
            </table>
            <hr/>
            <div>
                <table>
                    <tr>
                        <td>
                            <input type="text" id="login_uname_input" placeholder="Login Username" style="margin:1px"/><br />
                            <input type="password" id="login_pass_input" placeholder="Login Password" style="margin:1px"/><br />
                            <input type="password" id="login_confirm_pass_input" placeholder="Confirm Password" style="margin:1px"/><br />
                        </td>
                        <td style="height:100%">
                            <button class='style_btn' onclick="update_login(login_uname_input, login_pass_input, login_confirm_pass_input)">Update Login Details</button>
                        </td>
                    </tr>
                </table>
            </div>
            <hr />
            <div>
                <table>
                    <tr>
                        <td>
                            <input type="text" id="ssid_input" placeholder="WiFi SSID" style="margin:1px"/><br />
                            <input type="password" id="pass_input" placeholder="WiFi Password" style="margin:1px"/>
                        </td>
                        <td>
                            <button class='style_btn' onclick="if(confirm('Make sure that you have proivided the correct WiFi details,\nIncorrect details will reset the device and start an access point to re-configure after 30 sec.')) update_wifi(ssid_input.value, pass_input.value)">Update Wifi</button>
                            <button class='style_btn' onclick="scan_wifi()">Scan</button>                               
                        </td>
                    </tr>
                </table>
                <table id="ssid_list" cellspacing="15" style="border:#ccc solid thin; width:100%">
                    <tr>
                        <td style="font:Fjalla One">
                            <b>No SSID</b>
                        </td>
                    </tr>
                </table>
                <hr />
            </div>
        </center>
    </body>
</html>
